Organizations:

    - &OrdererOrg
        Name: OrdererMSP
        ID: OrdererMSP
        MSPDir: ../organizations/ordererOrganizations/carchain.com/msp
        OrdererEndpoints:
            - orderer.carchain.com:7050
        Policies:
            Readers:
                Type: Signature
                Rule: "OR('OrdererMSP.member')"
            Writers:
                Type: Signature
                Rule: "OR('OrdererMSP.member')"
            Admins:
                Type: Signature
                Rule: "OR('OrdererMSP.admin')"

    - &GovtOrg
        Name: GovtMSP
        ID: GovtMSP
        MSPDir: ../organizations/peerOrganizations/govt.carchain.com/msp
        Policies:
            Readers:
                Type: Signature
                Rule: "OR('GovtMSP.member')"
            Writers:
                Type: Signature
                Rule: "OR('GovtMSP.member')"
            Admins:
                Type: Signature
                Rule: "OR('GovtMSP.admin')"
            Endorsement:
                Type: Signature
                Rule: "OR('GovtMSP.peer')"
        AnchorPeers:
            - Host: peer0.govt.carchain.com
              Port: 7051

    - &UsersOrg
        Name: UsersMSP
        ID: UsersMSP
        MSPDir: ../organizations/peerOrganizations/users.carchain.com/msp
        Policies:
            Readers:
                Type: Signature
                Rule: "OR('UsersMSP.member')"
            Writers:
                Type: Signature
                Rule: "OR('UsersMSP.member')"
            Admins:
                Type: Signature
                Rule: "OR('UsersMSP.admin')"
            Endorsement:
                Type: Signature
                Rule: "OR('UsersMSP.peer')"
        AnchorPeers:
            - Host: peer0.users.carchain.com
              Port: 9051


Capabilities:
    Channel: &ChannelCapabilities
        V3_0: true
    Orderer: &OrdererCapabilities
        V3_0: true
    Application: &ApplicationCapabilities
        V3_0: true


Application: &ApplicationDefaults
    Policies:
        Readers:
            Type: ImplicitMeta
            Rule: "ANY Readers"
        Writers:
            Type: ImplicitMeta
            Rule: "ANY Writers"
        Admins:
            Type: ImplicitMeta
            Rule: "MAJORITY Admins"
        Endorsement:
            Type: ImplicitMeta
            Rule: "MAJORITY Endorsement"
    Capabilities:
        <<: *ApplicationCapabilities


Orderer: &OrdererDefaults
    OrdererType: etcdraft
    EtcdRaft:
        Consenters:
            - Host: orderer.carchain.com
              Port: 7050
              ClientTLSCert: ../organizations/ordererOrganizations/carchain.com/orderers/orderer.carchain.com/tls/server.crt
              ServerTLSCert: ../organizations/ordererOrganizations/carchain.com/orderers/orderer.carchain.com/tls/server.crt
    Policies:
        Readers:
            Type: ImplicitMeta
            Rule: "ANY Readers"
        Writers:
            Type: ImplicitMeta
            Rule: "ANY Writers"
        Admins:
            Type: ImplicitMeta
            Rule: "MAJORITY Admins"
        BlockValidation:
            Type: ImplicitMeta
            Rule: "ANY Writers"
    Capabilities:
        <<: *OrdererCapabilities


Channel: &ChannelDefaults
    Policies:
        Readers:
            Type: ImplicitMeta
            Rule: "ANY Readers"
        Writers:
            Type: ImplicitMeta
            Rule: "ANY Writers"
        Admins:
            Type: ImplicitMeta
            Rule: "MAJORITY Admins"
    Capabilities:
        <<: *ChannelCapabilities


Profiles:

    CarChainChannel:
        <<: *ChannelDefaults
        Orderer:
            <<: *OrdererDefaults
            Organizations:
                - *OrdererOrg
        Application:
            <<: *ApplicationDefaults
            Organizations:
                - *GovtOrg
                - *UsersOrg
